name: Deploy Express App to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.60.11.193
          username: ec2-user   # ✅ IMPORTANT FIX
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user || exit

            # Clone repo if not exists
            if [ ! -d "ensafe" ]; then
              git clone https://github.com/Jkarthikeyan003/ensafe.git
            fi

            cd ensafe

            # Pull latest changes
            git pull origin main

            # Install dependencies
            npm install

            # Restart app properly
            pm2 delete express-app || true
            pm2 start app.js --name express-app

            pm2 save